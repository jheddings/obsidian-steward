name: release

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Create draft release
              run: |
                  gh release create "${{ github.ref_name }}" \
                    --title "obsidian-steward ${{ github.ref_name }}" \
                    --generate-notes \
                    --draft
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
